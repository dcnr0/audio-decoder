<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>raw data pixel decoder</title>
    <style>
        /* fade-in keyframes for a smooth entrance */
        @keyframes fadein {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0b0b0b; /* slightly darker, deeper canvas background */
            color: #a0a0a0; /* muted, low-contrast text for a chill vibe */
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        .main-container {
            animation: fadein 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        h1 {
            color: #ffffff;
            font-weight: 400;
            letter-spacing: -0.5px;
            font-size: 1.85em;
            margin-bottom: 5px;
        }

        #canvas-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
        }

        canvas {
            background-color: #000;
            border: 1px solid #222; /* thinner, seamless border look */
            width: 540px; 
            height: 540px;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); /* soft drop shadow for the image */
        }

        .controls {
            margin: 30px 0;
        }

        /* custom styling to hide the default ugly file picker text */
        .file-upload-wrapper {
            position: relative;
            display: inline-block;
        }

        input[type="file"] {
            display: none; /* hidden default input */
        }

        .custom-file-upload {
            display: inline-block;
            background: #161616;
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.9em;
            letter-spacing: 0.3px;
            transition: all 0.4s ease; /* butter-smooth animation on hover */
        }

        .custom-file-upload:hover {
            background: #202020;
            border-color: #00a2ff;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.2);
        }

        .credits {
            color: #00a2ff;
            font-weight: bold;
            margin-top: 5px;
            font-size: 1.05em;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        p {
            font-size: 0.9em;
            max-width: 500px;
            margin: 15px auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>raw audio stream to png pixel decoder</h1>
        <div class="credits">by zepti_w on roblox</div>
        <p>upload your raw data audio file to reconstruct the pixel array into a 1080x1080 png.</p>

        <div class="controls">
            <div class="file-upload-wrapper">
                <label for="audio-file" class="custom-file-upload">
                    select audio file
                </label>
                <input type="file" id="audio-file" accept="audio/*">
            </div>
        </div>

        <div id="canvas-container">
            <canvas id="spectrogram" width="1080" height="1080"></canvas>
        </div>
        
        <p style="color: #555; margin-top: 25px;">right-click the image above and hit "save image as" to get your clean 1080x1080 png.</p>
    </div>

    <script>
        document.getElementById('audio-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // change layout text dynamically to reflect load status while staying lowercase
            document.querySelector('.custom-file-upload').textContent = "decoding file...";

            const reader = new FileReader();
            reader.onload = function(event) {
                decodeAudio(event.target.result);
            };
            reader.readAsArrayBuffer(file);
        });

        async function decodeAudio(arrayBuffer) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try {
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                renderRawPixels(audioBuffer);
                document.querySelector('.custom-file-upload').textContent = "done";
            } catch (error) {
                alert("error reading raw data audio file.");
                document.querySelector('.custom-file-upload').textContent = "select audio file";
                console.error(error);
            }
        }

        function renderRawPixels(audioBuffer) {
            const canvas = document.getElementById('spectrogram');
            const ctx = canvas.getContext('2d');
            
            const rawAudioData = audioBuffer.getChannelData(0);
            const imgData = ctx.createImageData(1080, 1080);
            
            let audioIdx = 0;
            
            for (let row = 0; row < 1080; row++) {
                for (let col = 0; col < 1080; col++) {
                    
                    if (audioIdx + 2 >= rawAudioData.length) break;
                    
                    const r = Math.floor((rawAudioData[audioIdx] + 1.0) * 127.5);
                    const g = Math.floor((rawAudioData[audioIdx + 1] + 1.0) * 127.5);
                    const b = Math.floor((rawAudioData[audioIdx + 2] + 1.0) * 127.5);
                    
                    const canvasPixelIdx = (row * 1080 + col) * 4;
                    
                    imgData.data[canvasPixelIdx]     = Math.min(255, Math.max(0, r)); 
                    imgData.data[canvasPixelIdx + 1] = Math.min(255, Math.max(0, g)); 
                    imgData.data[canvasPixelIdx + 2] = Math.min(255, Math.max(0, b)); 
                    imgData.data[canvasPixelIdx + 3] = 255;                           
                    
                    audioIdx += 3;
                }
            }
            
            ctx.putImageData(imgData, 0, 0);
        }
    </script>
</body>
</html>
