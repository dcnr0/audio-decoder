<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1080p Color Spectrogram Decoder - by zepti_W on roblox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        #canvas-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        canvas {
            background-color: #000;
            border: 2px solid #333;
            width: 540px; /* Displayed smaller on screen for layout, but underlying pixels are 1080x1080 */
            height: 540px;
        }
        .controls {
            margin: 20px 0;
        }
        input[type="file"] {
            background: #222;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
        }
        .credits {
            color: #00a2ff;
            font-weight: bold;
            margin-top: 5px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <h1>HD Color Audio to PNG Decoder</h1>
    <div class="credits">by zepti_W on roblox</div>
    <p>Upload your color audio file to reconstruct the $1080 \times 1080$ PNG image.</p>

    <div class="controls">
        <input type="file" id="audio-file" accept="audio/*">
    </div>

    <div id="canvas-container">
        <canvas id="spectrogram" width="1080" height="1080"></canvas>
    </div>
    
    <p style="color: #888;">Right-click the image above and hit "Save Image As" to get your clean 1080x1080 PNG.</p>

    <script>
        document.getElementById('audio-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                decodeAudio(event.target.result);
            };
            reader.readAsArrayBuffer(file);
        });

        async function decodeAudio(arrayBuffer) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            try {
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                renderColorSpectrogram(audioBuffer);
            } catch (error) {
                alert("Error decoding audio file.");
                console.error(error);
            }
        }

        function renderColorSpectrogram(audioBuffer) {
            const canvas = document.getElementById('spectrogram');
            const ctx = canvas.getContext('2d');
            const rawData = audioBuffer.getChannelData(0);
            
            const imgData = ctx.createImageData(1080, 1080);
            const samplesPerColumn = Math.floor(rawData.length / 1080);
            const fftSize = 2048; // Higher FFT size for sharp 1080 color separation

            for (let x = 0; x < 1080; x++) {
                const offset = x * samplesPerColumn;
                
                // Extract temporary block for processing
                const windowData = new Float32Array(fftSize);
                for (let i = 0; i < fftSize; i++) {
                    if (offset + i < rawData.length) {
                        windowData[i] = rawData[offset + i];
                    }
                }

                // Analyze frequencies row by row
                for (let y = 0; y < 1080; y++) {
                    // Approximate positions for our custom R, G, B frequency bands
                    // Matches the mathematical distribution from the Python script
                    const rSampleK = Math.floor(100 + (y / 1080) * 400);
                    const gSampleK = Math.floor(600 + (y / 1080) * 400);
                    const bSampleK = Math.floor(1100 + (y / 1080) * 400);

                    const getMagnitude = (k) => {
                        let real = 0, imag = 0;
                        for (let n = 0; n < fftSize; n++) {
                            const angle = (2 * Math.PI * k * n) / fftSize;
                            real += windowData[n] * Math.cos(angle);
                            imag -= windowData[n] * Math.sin(angle);
                        }
                        return Math.min(255, Math.sqrt(real * real + imag * imag) * 400);
                    };

                    const rIntensity = getMagnitude(rSampleK);
                    const gIntensity = getMagnitude(gSampleK);
                    const bIntensity = getMagnitude(bSampleK);

                    // Invert vertical layout so low frequencies stay at bottom
                    const targetY = 1079 - y;
                    const pixelIndex = (targetY * 1080 + x) * 4;

                    imgData.data[pixelIndex] = rIntensity;     // R
                    imgData.data[pixelIndex + 1] = gIntensity; // G
                    imgData.data[pixelIndex + 2] = bIntensity; // B
                    imgData.data[pixelIndex + 3] = 255;        // Alpha
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }
    </script>
</body>
</html>
